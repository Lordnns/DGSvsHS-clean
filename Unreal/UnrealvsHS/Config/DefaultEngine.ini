[ConsoleVariables]
; Chaos contact-solver iteration budget for the enemy pile-up. The solver cost at
; 15k enemies is dominated by iterating every enemy<->enemy / enemy<->player contact
; constraint; UE defaults are 8 position / 2 velocity iterations per physics tick.
; Our enemies are non-stacking 2D circles under damped seek forces (no gravity, no
; restitution, no stacking to converge) so they only need soft push-apart, not full
; convergence — dropping to 2/1 cuts the per-tick contact-solve work ~4x with
; essentially identical pile behavior, and sits closer to the low-iteration XPBD
; budgets the other legs run (avian2d / DOTS Physics). Applied at startup and
; re-asserted every physics advance via Chaos ApplyCVars(), so ApplyConfig can't
; reset it back to the config default. See CLAUDE.md 12.1/12.5.
p.Chaos.Solver.Iterations.Position=2
p.Chaos.Solver.Iterations.Velocity=1

